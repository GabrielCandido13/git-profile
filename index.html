<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Github</title>
</head>
<body>
    <div class="container-1">
        <div class="card-profile">
            <div class="profile-top">
                <div class="profile-photo">GC</div>
                <div class="name-username">
                    <span id="name">Gabriel Candido</span>
                    <span id="username">@GabrielCandido13</span>
                </div>
            </div>
            <div class="description">
                <span>Desenvolvedor fullstack em formação. Apaixonado por games e tecnologia.</span>
            </div>
            <div class="follow">
                <button id="btn-follow">Seguir</button>
            </div>
            <div class="infos">
                <span class="n1"><span class="n1r">12</span><span class="repos">repos</span></span>
                <span class="n2"><span class="n2f">48</span> <span class="followers">seguidores</span></span>
                <span class="n3"><span class="n3f">13</span> <span class="following">seguindo</span></span>
            </div>
        </div>
    </div>
</body>
</html>
